<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Handwriting · Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --surface-2: #F5F4EE;
    --ink: #0A0A0A;
    --ink-soft: #2A2A2A;
    --muted: #6B6B6B;
    --subtle: #9A9A9A;
    --hairline: #ECEAE3;
    --hairline-strong: #D8D5CC;
    --guide: #E2DFD6;
    --guide-soft: #EDEAE1;
    --success: #0A0A0A;
    --error: #B91C1C;
    --warn: #B45309;
    --cerulean: #5DADE2;
    --cerulean-soft: #D6ECF8;
    --cerulean-deep: #2A8BD2;
    --baseline-ink: #6FB5DC;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-display: 'Fraunces', "Iowan Old Style", "Hoefler Text", "Palatino Linotype", Georgia, serif;
    --font-handwriting: 'Andika', 'Comic Neue', 'Lucida Sans Unicode', sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100vh;
    height: 100dvh;
  }

  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--ink);
    touch-action: none;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ─────────────── Header ─────────────── */
  .header {
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--hairline);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .brand-mark {
    font-family: var(--font-display);
    font-weight: 300;
    font-size: 22px;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .brand-divider {
    width: 1px;
    height: 14px;
    background: var(--hairline-strong);
  }
  .brand-sub {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    font-weight: 500;
  }
  .progress-text {
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .progress-text strong {
    color: var(--ink);
    font-weight: 600;
  }

  .progress-bar-container {
    height: 1px;
    background: var(--hairline);
    flex-shrink: 0;
    position: relative;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(to right, var(--cerulean), var(--cerulean-deep));
    transition: width 0.5s var(--ease);
  }

  /* ─────────────── Instruction area ─────────────── */
  .instruction-area {
    padding: 24px 20px 16px;
    text-align: center;
    flex-shrink: 0;
    background: var(--bg);
  }
  .category-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .char-display {
    font-family: var(--font-handwriting);
    font-weight: 400;
    font-size: 96px;
    line-height: 1.45;
    min-height: 1.45em;
    padding-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  .char-label {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.01em;
  }
  .char-label .char-quoted {
    font-family: var(--font-handwriting);
    color: var(--ink);
    font-size: 1.15em;
  }
  .sample-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .sample-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--hairline-strong);
    transition: background 0.2s var(--ease), transform 0.2s var(--ease);
  }
  .sample-dot.done { background: var(--ink); }
  .sample-dot.current {
    background: transparent;
    box-shadow: inset 0 0 0 1.5px var(--ink);
    transform: scale(1.2);
  }

  /* ─────────────── Main stage (info | canvas | reference) ─────────────── */
  .main-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    gap: 24px;
    min-height: 0;
  }
  .info-col {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    flex-shrink: 0;
    width: 200px;
    max-width: 200px;
  }
  .info-col .category-label {
    margin-bottom: 0;
    text-align: left;
  }
  .info-col .char-display {
    align-self: stretch;
    width: 100%;
    justify-content: center;
    font-size: 110px;
    border: 1px solid var(--hairline-strong);
    border-radius: var(--radius-md);
    background: var(--surface);
    padding: 14px 16px 22px;
    box-shadow: 0 1px 0 var(--hairline-strong), 0 12px 28px -20px rgba(10,10,10,0.08);
    line-height: 1.3;
    min-height: auto;
  }
  .info-col .char-label {
    text-align: left;
    margin-top: 0;
  }
  .info-col .sample-dots {
    justify-content: flex-start;
    margin-top: 4px;
  }
  .canvas-col {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  canvas#canvas {
    background: var(--surface);
    border-radius: var(--radius-md);
    box-shadow: 0 1px 0 var(--hairline-strong), 0 8px 24px -16px rgba(10,10,10,0.08);
    touch-action: none;
    width: 320px;
    height: 160px;
  }
  /* .canvas-col .controls inherits the default vertical column layout */

  /* ─── Right-of-canvas: samples-per-char selector ─── */
  .canvas-side {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    width: 88px;
  }
  .canvas-side-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    font-weight: 500;
    text-align: center;
    line-height: 1.4;
  }
  .canvas-side .samples-select {
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 600;
    padding: 10px 28px 10px 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--hairline-strong);
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    width: 100%;
    text-align: center;
    text-align-last: center;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%230A0A0A' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    transition: border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);
  }
  .canvas-side .samples-select:hover { border-color: var(--cerulean); }
  .canvas-side .samples-select:focus {
    outline: none;
    border-color: var(--cerulean);
    box-shadow: 0 0 0 3px var(--cerulean-soft);
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  button {
    padding: 11px 18px;
    border-radius: var(--radius-md);
    border: 1px solid var(--hairline-strong);
    background: var(--surface);
    color: var(--ink);
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.08s var(--ease), background 0.15s var(--ease), border-color 0.15s var(--ease), opacity 0.15s var(--ease);
    letter-spacing: 0.01em;
    min-width: 96px;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.35; pointer-events: none; }

  .btn-accept {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
    font-weight: 600;
  }
  .btn-accept:not(:disabled):hover { background: #1A1A1A; }

  .btn-clear {
    background: transparent;
    border-color: var(--hairline-strong);
    color: var(--muted);
  }
  .btn-clear:not(:disabled):hover { color: var(--ink); border-color: var(--ink); }

  .btn-undo, .btn-skip {
    background: var(--surface);
    color: var(--ink-soft);
  }

  /* ─────────────── Char strip ─────────────── */
  .char-strip-wrap {
    flex-shrink: 0;
    background: var(--bg);
    border-top: 1px solid var(--hairline);
    border-bottom: 1px solid var(--hairline);
  }
  .char-strip {
    display: flex;
    flex-wrap: nowrap;
    gap: 4px;
    padding: 12px 16px;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x proximity;
    scrollbar-width: none;
  }
  .char-strip::-webkit-scrollbar { display: none; }
  .char-chip {
    min-width: 56px;
    height: 56px;
    flex-shrink: 0;
    padding: 0 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-md);
    border: 1px solid var(--hairline);
    cursor: pointer;
    font-family: var(--font-handwriting);
    font-weight: 400;
    font-size: 28px;
    background: var(--surface);
    color: var(--ink-soft);
    scroll-snap-align: center;
    transition: all 0.15s var(--ease);
  }
  .char-chip:active { transform: scale(0.94); }
  .char-chip.current {
    background: var(--cerulean);
    color: var(--surface);
    border-color: var(--cerulean);
    box-shadow: 0 0 0 3px var(--cerulean-soft);
  }
  .char-chip.done {
    background: var(--surface);
    color: var(--subtle);
    border-color: var(--hairline);
    position: relative;
  }
  .char-chip.done::after {
    content: '';
    position: absolute;
    top: 6px;
    right: 6px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--ink);
  }

  /* ─────────────── Status pill ─────────────── */
  .status-bar-wrap {
    flex-shrink: 0;
    padding: 10px;
    display: flex;
    justify-content: center;
    background: var(--bg);
  }
  .status-bar {
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--hairline);
    color: var(--muted);
    font-size: 11px;
    border-radius: 100px;
    letter-spacing: 0.02em;
    font-weight: 500;
    transition: color 0.2s var(--ease), border-color 0.2s var(--ease);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .status-bar::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--subtle);
    transition: background 0.2s var(--ease);
  }
  .status-bar.saving { color: var(--ink); }
  .status-bar.saving::before { background: var(--warn); animation: pulse 1.2s ease-in-out infinite; }
  .status-bar.saved { color: var(--ink); border-color: var(--cerulean); }
  .status-bar.saved::before { background: var(--cerulean); }
  .status-bar.error { color: var(--error); border-color: var(--error); }
  .status-bar.error::before { background: var(--error); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ─────────────── Overlay (category picker) ─────────────── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.32);
    z-index: 100;
    justify-content: center;
    align-items: flex-end;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: fadeIn 0.25s var(--ease);
  }
  .overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .overlay-content {
    background: var(--bg);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    padding: 28px 28px 32px;
    width: 100%;
    max-width: 720px;
    max-height: 86vh;
    overflow-y: auto;
    animation: slideUp 0.32s var(--ease);
    box-shadow: 0 -8px 40px -12px rgba(10,10,10,0.18);
  }
  .overlay-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
  }
  .overlay-content h2 {
    font-family: var(--font-display);
    font-weight: 300;
    font-size: 28px;
    letter-spacing: -0.01em;
  }
  .icon-btn {
    background: transparent;
    border: none;
    font-size: 24px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 10px;
    line-height: 1;
    min-width: auto;
    border-radius: var(--radius-sm);
  }
  .icon-btn:hover { color: var(--ink); background: var(--hairline); }

  .cat-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
  }
  .cat-btn {
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    font-family: var(--font-ui);
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.15s var(--ease);
    min-width: 0;
    color: var(--ink);
  }
  .cat-btn:hover { border-color: var(--ink); }
  .cat-btn:active { background: var(--surface-2); }
  .cat-btn-name {
    font-weight: 500;
    color: var(--ink);
  }
  .cat-btn-chars {
    color: var(--subtle);
    font-size: 14px;
    margin-left: 8px;
    font-family: var(--font-handwriting);
    font-weight: 400;
  }
  .cat-progress {
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    margin-left: 12px;
  }
  .cat-btn.cat-complete {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }
  .cat-btn.cat-complete .cat-btn-name,
  .cat-btn.cat-complete .cat-btn-chars,
  .cat-btn.cat-complete .cat-progress {
    color: var(--surface);
    opacity: 0.85;
  }
  .cat-btn.cat-complete .cat-btn-name { opacity: 1; }

  .overlay-section {
    margin-top: 24px;
    padding-top: 22px;
    border-top: 1px solid var(--hairline);
  }
  .overlay-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 500;
  }
  .samples-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .samples-row label {
    font-size: 13px;
    color: var(--ink-soft);
  }
  select#samplesPerChar {
    font-family: var(--font-ui);
    font-size: 13px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--hairline-strong);
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%230A0A0A' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 28px;
  }
  .export-btns {
    display: flex;
    gap: 6px;
    margin-top: 14px;
  }
  .export-btns button {
    flex: 1;
    font-size: 13px;
    padding: 12px 10px;
  }
  .footer-note {
    margin-top: 18px;
    font-size: 11px;
    color: var(--subtle);
    text-align: center;
    line-height: 1.5;
  }

  /* ─────────────── Manager + detail ─────────────── */
  .manager-overlay,
  .sample-detail {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    flex-direction: column;
    animation: fadeIn 0.2s var(--ease);
  }
  .manager-overlay.show,
  .sample-detail.show { display: flex; }
  .sample-detail { z-index: 300; }

  .manager-header,
  .detail-header {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--hairline);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .manager-header h2,
  .detail-header h2 {
    font-family: var(--font-display);
    font-weight: 300;
    font-size: 22px;
    letter-spacing: -0.01em;
  }

  .manager-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

  .manager-char-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
    gap: 6px;
    margin-bottom: 22px;
  }
  .manager-char-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--hairline);
    cursor: pointer;
    font-family: var(--font-handwriting);
    font-weight: 400;
    font-size: 24px;
    color: var(--ink-soft);
    position: relative;
    transition: all 0.12s var(--ease);
  }
  .manager-char-cell:hover { border-color: var(--ink); }
  .manager-char-cell:active { background: var(--surface-2); }
  .manager-char-cell.has-samples {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }
  .manager-char-cell .cell-count {
    font-family: var(--font-ui);
    font-size: 9px;
    position: absolute;
    bottom: 4px;
    font-variant-numeric: tabular-nums;
    opacity: 0.7;
    font-weight: 500;
  }

  .manager-cat-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin: 22px 0 10px 2px;
  }
  .manager-cat-label:first-child { margin-top: 0; }

  .nav-btn {
    background: transparent;
    border: none;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 10px;
    line-height: 1;
    min-width: auto;
    border-radius: var(--radius-sm);
  }
  .nav-btn:hover { color: var(--ink); background: var(--hairline); }

  .detail-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .sample-card {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .sample-preview {
    width: 160px;
    height: 80px;
    border: 1px solid var(--hairline);
    border-radius: var(--radius-sm);
    flex-shrink: 0;
    background: var(--surface);
  }
  .sample-info {
    flex: 1;
    font-size: 12px;
    color: var(--muted);
    min-width: 0;
  }
  .sample-info .sid {
    font-family: var(--font-mono);
    font-weight: 500;
    color: var(--ink);
    font-size: 12px;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .btn-delete-sample {
    background: var(--surface);
    color: var(--error);
    border: 1px solid var(--hairline-strong);
    padding: 8px 14px;
    font-size: 12px;
    min-width: auto;
  }
  .btn-delete-sample:hover { border-color: var(--error); }
  .btn-add-sample {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
    padding: 14px 24px;
    font-size: 14px;
    width: 100%;
    margin-top: 14px;
  }
  .detail-canvas-area {
    display: none;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    padding: 18px;
    margin-top: 12px;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .detail-canvas-area.show { display: flex; }
  .detail-controls { display: flex; gap: 8px; }

  /* ─────────────── iPad portrait tuning ─────────────── */
  @media (min-width: 900px) {
    .info-col .char-display { font-size: 130px; }
    canvas#canvas { width: 380px; height: 190px; }
    .header { padding: 18px 32px; }
    .info-col { width: 220px; max-width: 220px; }
    .reference-col { width: 240px; max-width: 240px; }
    .reference-canvas { width: 220px; height: 110px; }
  }

  /* ─── Stack vertically on narrow screens ─── */
  @media (max-width: 760px) {
    .main-stage {
      flex-direction: column;
      gap: 14px;
      padding: 14px 12px;
    }
    .info-col {

      justify-content: center;
      font-size: 84px;
    }
    .info-col .sample-dots { justify-content: center; }
    .canvas-col { flex-direction: column; }
  }
</style>
</head>

<script>
let SAMPLES_PER_CHAR = 1;

const CATEGORIES = [
  { name: "Lowercase Letters", chars: "abcdefghijklmnopqrstuvwxyz".split(""), labels: null },
  { name: "Uppercase Letters", chars: "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""), labels: null },
  { name: "Digits", chars: "0123456789".split(""), labels: null },
  { name: "Basic Punctuation",
    chars: [".", ",", ";", ":", "!", "?"],
    labels: ["period", "comma", "semicolon", "colon", "exclamation", "question mark"] },
  { name: "Quotes & Apostrophes",
    chars: ["'", "\"", "`"],
    labels: ["apostrophe", "double quote", "backtick"] },
  { name: "Brackets",
    chars: ["(", ")", "[", "]", "{", "}"],
    labels: ["left paren", "right paren", "left bracket", "right bracket", "left brace", "right brace"] },
  { name: "Math Operators",
    chars: ["+", "-", "=", "*", "/", "<", ">"],
    labels: ["plus", "minus / hyphen", "equals", "asterisk / multiply", "forward slash", "less than", "greater than"] },
  { name: "Special Characters",
    chars: ["@", "#", "$", "%", "&", "^", "_", "~", "|", "\\"],
    labels: ["at sign", "hash / pound", "dollar sign", "percent", "ampersand", "caret", "underscore", "tilde", "pipe / vertical bar", "backslash"] },
  { name: "Greek Lowercase",
    chars: ["\u03B1","\u03B2","\u03B3","\u03B4","\u03B5","\u03B6","\u03B7","\u03B8","\u03B9","\u03BA","\u03BB","\u03BC","\u03BD","\u03BE","\u03C0","\u03C1","\u03C3","\u03C4","\u03C5","\u03C6","\u03C7","\u03C8","\u03C9"],
    labels: ["alpha","beta","gamma","delta","epsilon","zeta","eta","theta","iota","kappa","lambda","mu","nu","xi","pi","rho","sigma","tau","upsilon","phi","chi","psi","omega"] },
  { name: "Greek Uppercase",
    chars: ["\u0393","\u0394","\u0398","\u039B","\u039E","\u03A0","\u03A3","\u03A6","\u03A8","\u03A9"],
    labels: ["Gamma","Delta","Theta","Lambda","Xi","Pi","Sigma","Phi","Psi","Omega"] },
  { name: "Big Operators",
    chars: ["\u2211","\u220F","\u222B","\u222C","\u222E"],
    labels: ["summation \u03A3","product \u03A0","integral","double integral","contour integral"] },
  { name: "Relations",
    chars: ["\u2264","\u2265","\u2260","\u2248","\u221D","\u2261","\u226A","\u226B","\u2282","\u2283","\u2286","\u2287","\u2208","\u2209"],
    labels: ["less or equal \u2264","greater or equal \u2265","not equal \u2260","approx \u2248","proportional \u221D","equiv \u2261","much less \u226A","much greater \u226B","subset \u2282","superset \u2283","subset eq \u2286","superset eq \u2287","element of \u2208","not element \u2209"] },
  { name: "Math Symbols",
    chars: ["\u00B1","\u00D7","\u00F7","\u2213","\u221A","\u221E","\u2202","\u2207","\u2205","\u2200","\u2203","\u00AC","\u2227","\u2228","\u2229","\u222A"],
    labels: ["plus-minus \u00B1","times \u00D7","divide \u00F7","minus-plus \u2213","sqrt radical \u221A","infinity \u221E","partial deriv \u2202","nabla/del \u2207","empty set \u2205","for all \u2200","exists \u2203","not \u00AC","logical and \u2227","logical or \u2228","intersection \u2229","union \u222A"] },
  { name: "Arrows",
    chars: ["\u2190","\u2191","\u2192","\u2193","\u2194","\u21D0","\u21D2","\u21D4","\u21A6"],
    labels: ["left arrow \u2190","up arrow \u2191","right arrow \u2192","down arrow \u2193","left-right \u2194","left double \u21D0","right double (implies) \u21D2","iff \u21D4","maps to \u21A6"] },
  { name: "Dots & Misc",
    chars: ["\u22C5","\u2026","\u22EE","\u22EF","\u22F1","\u2032","\u2033","\u00B0"],
    labels: ["center dot \u22C5","ellipsis \u2026","vertical dots \u22EE","horizontal dots \u22EF","diagonal dots \u22F1","prime \u2032","double prime \u2033","degree \u00B0"] },
  { name: "Math Variables (lowercase)", tag: "mathvar",
    chars: "abcdefghijklmnopqrstuvwxyz".split(""),
    labels: null },
  { name: "Math Variables (uppercase)", tag: "mathvar",
    chars: "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""),
    labels: null },
  { name: "Math Delimiters (stretchy)", tag: "mathdelim",
    chars: ["(", ")", "[", "]", "{", "}"],
    labels: [
      "left paren \u2014 draw as 3 strokes: top curve, vertical bar, bottom curve",
      "right paren \u2014 draw as 3 strokes: top curve, vertical bar, bottom curve",
      "left bracket \u2014 draw as 3 strokes: top horizontal, vertical bar, bottom horizontal",
      "right bracket \u2014 draw as 3 strokes: top horizontal, vertical bar, bottom horizontal",
      "left brace \u2014 draw as 3 strokes: top hook, middle point, bottom hook",
      "right brace \u2014 draw as 3 strokes: top hook, middle point, bottom hook",
    ] },
];

function progressKey(char, tag) {
  return tag ? `${tag}:${char}` : char;
}

const ALL_KEYS = CATEGORIES.flatMap(c => c.chars.map(ch => progressKey(ch, c.tag)));

let progress = {};
let currentCategory = 0;
let currentCharIdx = 0;
let currentSampleIdx = 0;
let strokes = [];
let currentStroke = [];
let isDrawing = false;
let saving = false;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  const cssW = canvas.offsetWidth || 320;
  const cssH = canvas.offsetHeight || 160;
  const dpr = window.devicePixelRatio || 2;
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  redraw();
}

function getPoint(e) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 2;
  return {
    x: (e.clientX - rect.left) * (canvas.width / dpr / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / dpr / rect.height),
    pressure: e.pressure || 0.5,
  };
}

function startStroke(e) {
  if (e.pointerType === "touch") return;
  e.preventDefault();
  isDrawing = true;
  currentStroke = [getPoint(e)];
  canvas.setPointerCapture(e.pointerId);
}

function continueStroke(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ce of events) {
    const pt = getPoint(ce);
    currentStroke.push(pt);
    const len = currentStroke.length;
    if (len < 2) continue;
    ctx.strokeStyle = "#0A0A0A";
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = 1.0 + pt.pressure * 5.0;
    if (len >= 3) {
      const p0 = currentStroke[len - 3];
      const p1 = currentStroke[len - 2];
      const p2 = pt;
      const mid1x = (p0.x + p1.x) / 2;
      const mid1y = (p0.y + p1.y) / 2;
      const mid2x = (p1.x + p2.x) / 2;
      const mid2y = (p1.y + p2.y) / 2;
      ctx.beginPath();
      ctx.moveTo(mid1x, mid1y);
      ctx.quadraticCurveTo(p1.x, p1.y, mid2x, mid2y);
      ctx.stroke();
    } else {
      const prev = currentStroke[len - 2];
      ctx.beginPath();
      ctx.moveTo(prev.x, prev.y);
      ctx.lineTo(pt.x, pt.y);
      ctx.stroke();
    }
  }
}

function endStroke(e) {
  if (!isDrawing) return;
  e.preventDefault();
  isDrawing = false;
  if (currentStroke.length >= 2) strokes.push([...currentStroke]);
  currentStroke = [];
  updateButtons();
}

function drawGuidelines(context, w, h) {
  const ascender = h * 0.15;
  const xHeight = h * 0.4;
  const baseline = h * 0.7;
  const descender = h * 0.9;

  // Ascender — fine dotted, very light
  context.strokeStyle = "#E5E2D8";
  context.lineWidth = 0.8;
  context.setLineDash([1, 4]);
  context.beginPath(); context.moveTo(0, ascender); context.lineTo(w, ascender); context.stroke();

  // X-height — dashed, medium
  context.strokeStyle = "#C8C5BC";
  context.lineWidth = 0.8;
  context.setLineDash([5, 4]);
  context.beginPath(); context.moveTo(0, xHeight); context.lineTo(w, xHeight); context.stroke();

  // Baseline — solid, the anchor line (monochrome)
  context.strokeStyle = "#9A9789";
  context.lineWidth = 1.3;
  context.setLineDash([]);
  context.beginPath(); context.moveTo(0, baseline); context.lineTo(w, baseline); context.stroke();

  // Descender — fine dotted
  context.strokeStyle = "#E5E2D8";
  context.lineWidth = 0.8;
  context.setLineDash([1, 4]);
  context.beginPath(); context.moveTo(0, descender); context.lineTo(w, descender); context.stroke();

  context.setLineDash([]);

  // Left-aligned labels (right-handed users — keep markers away from the writing hand)
  context.fillStyle = "#A8A59C";
  context.font = "6.5px ui-monospace, 'SF Mono', Menlo, monospace";
  context.textAlign = "left";
  context.fillText("ASC",  4, ascender - 2);
  context.fillText("X",    4, xHeight - 2);
  context.fillText("BASE", 4, baseline - 2);
  context.fillText("DESC", 4, descender - 2);
}

function drawStrokes(context, strokeList) {
  context.strokeStyle = "#0A0A0A";
  context.lineCap = "round";
  context.lineJoin = "round";
  for (const stroke of strokeList) {
    if (stroke.length < 2) continue;
    const gx = i => stroke[i].x !== undefined ? stroke[i].x : stroke[i][0];
    const gy = i => stroke[i].y !== undefined ? stroke[i].y : stroke[i][1];
    const gp = i => { const pt = stroke[i]; return pt.pressure !== undefined ? pt.pressure : (pt[2] || 0.5); };
    for (let i = 1; i < stroke.length; i++) {
      context.lineWidth = 1.0 + gp(i) * 5.0;
      context.beginPath();
      if (i >= 2) {
        const mid1x = (gx(i-2) + gx(i-1)) / 2;
        const mid1y = (gy(i-2) + gy(i-1)) / 2;
        const mid2x = (gx(i-1) + gx(i)) / 2;
        const mid2y = (gy(i-1) + gy(i)) / 2;
        context.moveTo(mid1x, mid1y);
        context.quadraticCurveTo(gx(i-1), gy(i-1), mid2x, mid2y);
      } else {
        context.moveTo(gx(i-1), gy(i-1));
        context.lineTo(gx(i), gy(i));
      }
      context.stroke();
    }
  }
}

function redraw() {
  const dpr = window.devicePixelRatio || 2;
  const w = canvas.width / dpr;
  const h = canvas.height / dpr;
  ctx.clearRect(0, 0, w, h);
  drawGuidelines(ctx, w, h);
  drawStrokes(ctx, strokes);
}

function updateDisplay() {
  const cat = CATEGORIES[currentCategory];
  const char = cat.chars[currentCharIdx];
  const tag = cat.tag || null;
  const key = progressKey(char, tag);
  const label = cat.labels ? cat.labels[currentCharIdx] : null;
  const saved = progress[key] || 0;

  document.getElementById("categoryLabel").textContent = cat.name;

  let displayChar = char;
  if (char === " ") displayChar = "\u2423";
  document.getElementById("charDisplay").textContent = displayChar;

  const labelEl = document.getElementById("charLabel");
  if (label) {
    labelEl.innerHTML = `<span class="char-quoted">"${char}"</span> &mdash; ${label} &nbsp;·&nbsp; sample ${currentSampleIdx + 1} of ${SAMPLES_PER_CHAR}`;
  } else {
    labelEl.textContent = `sample ${currentSampleIdx + 1} of ${SAMPLES_PER_CHAR}`;
  }

  const dots = document.getElementById("sampleDots");
  dots.innerHTML = "";
  for (let i = 0; i < SAMPLES_PER_CHAR; i++) {
    const dot = document.createElement("div");
    dot.className = "sample-dot";
    if (i < saved) dot.classList.add("done");
    if (i === currentSampleIdx) dot.classList.add("current");
    dots.appendChild(dot);
  }

  const totalKeys = ALL_KEYS.length;
  const completedKeys = ALL_KEYS.filter(k => (progress[k] || 0) >= SAMPLES_PER_CHAR).length;
  const totalSamples = ALL_KEYS.reduce((sum, k) => sum + (progress[k] || 0), 0);
  const totalNeeded = totalKeys * SAMPLES_PER_CHAR;
  document.getElementById("progressText").innerHTML =
    `<strong>${completedKeys}</strong> / ${totalKeys} chars &nbsp;·&nbsp; ${totalSamples} samples`;
  document.getElementById("progressBar").style.width =
    `${(totalSamples / totalNeeded) * 100}%`;

  renderCharStrip();
}


function renderCharStrip() {
  const strip = document.getElementById("charStrip");
  const cat = CATEGORIES[currentCategory];
  strip.innerHTML = "";
  cat.chars.forEach((ch, i) => {
    const key = progressKey(ch, cat.tag);
    const count = progress[key] || 0;
    const btn = document.createElement("button");
    btn.className = "char-chip";
    if (i === currentCharIdx) btn.classList.add("current");
    else if (count >= SAMPLES_PER_CHAR) btn.classList.add("done");
    btn.textContent = ch;
    btn.onclick = () => {
      currentCharIdx = i;
      currentSampleIdx = progress[key] || 0;
      clearCanvas();
      updateDisplay();
    };
    strip.appendChild(btn);
  });
  const currentBtn = strip.querySelector(".current");
  if (currentBtn) currentBtn.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
}

function updateButtons() {
  document.getElementById("btnUndo").disabled = strokes.length === 0 || saving;
  document.getElementById("btnClear").disabled = strokes.length === 0 || saving;
  document.getElementById("btnAccept").disabled = strokes.length === 0 || saving;
}

function setStatus(msg, cls = "") {
  const bar = document.getElementById("statusBar");
  bar.textContent = msg;
  bar.className = "status-bar " + cls;
}

function clearCanvas() {
  strokes = [];
  currentStroke = [];
  redraw();
  updateButtons();
}

function skip() {
  clearCanvas();
  advanceChar();
}

async function accept() {
  if (strokes.length === 0 || saving) return;
  const cat = CATEGORIES[currentCategory];
  const char = cat.chars[currentCharIdx];
  const tag = cat.tag || null;
  const key = progressKey(char, tag);
  const strokeData = strokes.map(s => s.map(p => [p.x, p.y, p.pressure]));

  saving = true;
  updateButtons();
  setStatus("Saving…", "saving");

  try {
    const body = { char, sample_idx: currentSampleIdx, strokes: strokeData };
    if (tag) body.tag = tag;
    const resp = await fetch("/api/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    progress[key] = (progress[key] || 0) + 1;
    setStatus(`Saved sample ${progress[key]} for "${char}"${tag ? ` [${tag}]` : ""}`, "saved");
    clearCanvas();
    advanceSample();
  } catch (err) {
    setStatus(`Save failed: ${err.message}`, "error");
  } finally {
    saving = false;
    updateButtons();
  }
}

function advanceSample() {
  const cat = CATEGORIES[currentCategory];
  const char = cat.chars[currentCharIdx];
  const key = progressKey(char, cat.tag);
  const saved = progress[key] || 0;
  if (saved >= SAMPLES_PER_CHAR) {
    advanceChar();
  } else {
    currentSampleIdx = saved;
    updateDisplay();
  }
}

function advanceChar() {
  const cat = CATEGORIES[currentCategory];
  for (let i = currentCharIdx + 1; i < cat.chars.length; i++) {
    const key = progressKey(cat.chars[i], cat.tag);
    if ((progress[key] || 0) < SAMPLES_PER_CHAR) {
      currentCharIdx = i;
      currentSampleIdx = progress[key] || 0;
      updateDisplay();
      return;
    }
  }
  showCategoryPicker();
}

function goToChar(catIdx, charIdx) {
  currentCategory = catIdx;
  currentCharIdx = charIdx;
  const cat = CATEGORIES[catIdx];
  const key = progressKey(cat.chars[charIdx], cat.tag);
  currentSampleIdx = progress[key] || 0;
  document.getElementById("overlay").classList.remove("show");
  clearCanvas();
  updateDisplay();
}

function showCategoryPicker() {
  const grid = document.getElementById("catGrid");
  grid.innerHTML = "";
  CATEGORIES.forEach((cat, catIdx) => {
    const total = cat.chars.length;
    const done = cat.chars.filter(c => (progress[progressKey(c, cat.tag)] || 0) >= SAMPLES_PER_CHAR).length;
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (done === total ? " cat-complete" : "");
    btn.innerHTML = `
      <span style="display:flex; flex-direction:column; gap:4px; min-width:0; flex:1;">
        <span class="cat-btn-name">${cat.name}</span>
        <span class="cat-btn-chars">${cat.chars.slice(0, 18).join(" ")}${cat.chars.length > 18 ? " …" : ""}</span>
      </span>
      <span class="cat-progress">${done} / ${total}</span>`;
    btn.onclick = () => {
      for (let i = 0; i < cat.chars.length; i++) {
        if ((progress[progressKey(cat.chars[i], cat.tag)] || 0) < SAMPLES_PER_CHAR) { goToChar(catIdx, i); return; }
      }
      goToChar(catIdx, 0);
    };
    grid.appendChild(btn);
  });
  document.getElementById("overlay").classList.add("show");
}

async function downloadSamples() {
  setStatus("Downloading…", "saving");
  try {
    const resp = await fetch("/api/export");
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "handwriting_samples.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setStatus(`Downloaded ${data.total} samples`, "saved");
  } catch (err) {
    setStatus(`Download failed: ${err.message}`, "error");
  }
}

async function resetAll() {
  if (!confirm("This will delete ALL samples from the server. Are you sure?")) return;
  if (!confirm("Really? This cannot be undone.")) return;
  setStatus("Deleting…", "saving");
  try {
    const resp = await fetch("/api/delete-all", { method: "POST" });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    progress = {};
    currentCategory = 0;
    currentCharIdx = 0;
    currentSampleIdx = 0;
    updateDisplay();
    document.getElementById("overlay").classList.remove("show");
    requestAnimationFrame(() => showCategoryPicker());
    setStatus(`Deleted ${data.deleted} samples`, "saved");
  } catch (err) {
    setStatus(`Reset failed: ${err.message}`, "error");
  }
}

// ========== SAMPLE MANAGER ==========

function openManager() {
  document.getElementById("overlay").classList.remove("show");
  renderManagerGrid();
  document.getElementById("managerOverlay").classList.add("show");
}

function closeManager() {
  document.getElementById("managerOverlay").classList.remove("show");
}

function renderManagerGrid() {
  const body = document.getElementById("managerBody");
  body.innerHTML = "";
  CATEGORIES.forEach((cat, catIdx) => {
    const label = document.createElement("div");
    label.className = "manager-cat-label";
    label.textContent = cat.name;
    body.appendChild(label);
    const grid = document.createElement("div");
    grid.className = "manager-char-grid";
    cat.chars.forEach((ch, chIdx) => {
      const key = progressKey(ch, cat.tag);
      const cell = document.createElement("div");
      cell.className = "manager-char-cell";
      const count = progress[key] || 0;
      if (count > 0) cell.classList.add("has-samples");
      cell.innerHTML = `<span>${ch}</span><span class="cell-count">${count}</span>`;
      cell.onclick = () => {
        managerCatIdx = catIdx;
        managerCharIdx = chIdx;
        openCharDetail(ch, cat.name, cat.tag);
      };
      grid.appendChild(cell);
    });
    body.appendChild(grid);
  });
}

let managerCatIdx = -1;
let managerCharIdx = -1;

async function openCharDetail(char, catName, tag) {
  const detail = document.getElementById("sampleDetail");
  const body = document.getElementById("detailBody");
  const title = document.getElementById("detailTitle");
  const countEl = document.getElementById("detailCount");
  const key = progressKey(char, tag);

  const catLabel = catName || (managerCatIdx >= 0 ? CATEGORIES[managerCatIdx].name : "");
  const posLabel = managerCatIdx >= 0 ? ` (${managerCharIdx + 1}/${CATEGORIES[managerCatIdx].chars.length})` : "";
  title.innerHTML = `<span style="font-family:var(--font-handwriting); font-size:1.2em;">${char}</span> &mdash; ${catLabel}${posLabel}`;
  countEl.textContent = "Loading…";
  body.innerHTML = '<p style="text-align:center; color:var(--muted); padding:40px; font-size:13px;">Loading samples…</p>';
  detail.classList.add("show");

  try {
    let url = `/api/list-char?char=${encodeURIComponent(char)}`;
    if (tag) url += `&tag=${encodeURIComponent(tag)}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    countEl.textContent = `${data.count} sample${data.count !== 1 ? 's' : ''}`;
    body.innerHTML = "";
    if (data.count === 0) {
      body.innerHTML = '<p style="text-align:center; color:var(--muted); padding:40px; font-size:13px;">No samples yet</p>';
    }
    data.samples.forEach(sample => {
      const card = document.createElement("div");
      card.className = "sample-card";
      const previewCanvas = document.createElement("canvas");
      previewCanvas.className = "sample-preview";
      previewCanvas.width = 320;
      previewCanvas.height = 160;
      const pctx = previewCanvas.getContext("2d");
      pctx.scale(1.6, 1.6);
      drawGuidelines(pctx, 200, 100);
      drawStrokes(pctx, sample.strokes);
      const info = document.createElement("div");
      info.className = "sample-info";
      const date = sample.timestamp ? new Date(sample.timestamp).toLocaleDateString() : "unknown";
      info.innerHTML = `<div class="sid">${sample.source_id}</div><div>${date} &nbsp;·&nbsp; ${sample.strokes.length} stroke${sample.strokes.length !== 1 ? 's' : ''}</div>`;
      const delBtn = document.createElement("button");
      delBtn.className = "btn-delete-sample";
      delBtn.textContent = "Delete";
      delBtn.onclick = async () => {
        if (!confirm(`Delete sample ${sample.source_id}?`)) return;
        delBtn.disabled = true;
        delBtn.textContent = "…";
        try {
          const r = await fetch("/api/delete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ source_id: sample.source_id }),
          });
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          card.remove();
          progress[key] = Math.max(0, (progress[key] || 1) - 1);
          countEl.textContent = `${progress[key]} sample${progress[key] !== 1 ? 's' : ''}`;
          updateDisplay();
        } catch (err) {
          alert(`Delete failed: ${err.message}`);
          delBtn.disabled = false;
          delBtn.textContent = "Delete";
        }
      };
      card.appendChild(previewCanvas);
      card.appendChild(info);
      card.appendChild(delBtn);
      body.appendChild(card);
    });
    const addBtn = document.createElement("button");
    addBtn.className = "btn-add-sample";
    addBtn.textContent = "+ Draw new sample";
    addBtn.onclick = () => openAddSample(char, data.count, tag);
    body.appendChild(addBtn);
    const canvasArea = document.createElement("div");
    canvasArea.className = "detail-canvas-area";
    canvasArea.id = "detailCanvasArea";
    const drawCanvas = document.createElement("canvas");
    drawCanvas.id = "detailCanvas";
    drawCanvas.style.cssText = "width:240px; height:120px; background:var(--surface); border-radius:var(--radius-md); border:1px solid var(--hairline); touch-action:none;";
    drawCanvas.width = 480;
    drawCanvas.height = 240;
    const ctrlDiv = document.createElement("div");
    ctrlDiv.className = "detail-controls";
    ctrlDiv.innerHTML = `
      <button class="btn-undo" id="detailUndo" disabled>Undo</button>
      <button class="btn-clear" id="detailClear" disabled>Clear</button>
      <button class="btn-accept" id="detailAccept" disabled>Save</button>
      <button class="btn-skip" id="detailCancel">Cancel</button>
    `;
    canvasArea.appendChild(drawCanvas);
    canvasArea.appendChild(ctrlDiv);
    body.appendChild(canvasArea);
  } catch (err) {
    body.innerHTML = `<p style="text-align:center; color:var(--error); padding:40px; font-size:13px;">Error: ${err.message}</p>`;
  }
}

function openAddSample(char, existingCount, tag) {
  const area = document.getElementById("detailCanvasArea");
  area.classList.add("show");
  area.scrollIntoView({ behavior: "smooth" });
  const drawCanvas = document.getElementById("detailCanvas");
  let dStrokes = [];
  let dCurrent = [];
  let dDrawing = false;
  const newCanvas = drawCanvas.cloneNode(true);
  drawCanvas.parentNode.replaceChild(newCanvas, drawCanvas);
  const nctx = newCanvas.getContext("2d");
  nctx.setTransform(1, 0, 0, 1, 0, 0);
  nctx.scale(2, 2);

  function nRedraw() {
    nctx.clearRect(0, 0, 240, 120);
    drawGuidelines(nctx, 240, 120);
    drawStrokes(nctx, dStrokes);
  }
  nRedraw();

  function dGetPoint(e) {
    const rect = newCanvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (newCanvas.width / 2 / rect.width),
      y: (e.clientY - rect.top) * (newCanvas.height / 2 / rect.height),
      pressure: e.pressure || 0.5,
    };
  }

  function updateDButtons() {
    document.getElementById("detailUndo").disabled = dStrokes.length === 0;
    document.getElementById("detailClear").disabled = dStrokes.length === 0;
    document.getElementById("detailAccept").disabled = dStrokes.length === 0;
  }

  newCanvas.addEventListener("pointerdown", e => {
    if (e.pointerType === "touch") return;
    e.preventDefault();
    dDrawing = true;
    dCurrent = [dGetPoint(e)];
    newCanvas.setPointerCapture(e.pointerId);
  });
  newCanvas.addEventListener("pointermove", e => {
    if (!dDrawing) return;
    e.preventDefault();
    const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    for (const ce of events) {
      const pt = dGetPoint(ce);
      dCurrent.push(pt);
      const prev = dCurrent[dCurrent.length - 2];
      nctx.beginPath();
      nctx.moveTo(prev.x, prev.y);
      nctx.lineTo(pt.x, pt.y);
      nctx.strokeStyle = "#0A0A0A";
      nctx.lineWidth = 1.0 + pt.pressure * 5.0;
      nctx.lineCap = "round";
      nctx.lineJoin = "round";
      nctx.stroke();
    }
  });
  newCanvas.addEventListener("pointerup", e => {
    if (!dDrawing) return;
    e.preventDefault();
    dDrawing = false;
    if (dCurrent.length >= 2) dStrokes.push([...dCurrent]);
    dCurrent = [];
    updateDButtons();
  });
  newCanvas.addEventListener("pointercancel", () => { dDrawing = false; dCurrent = []; });

  document.getElementById("detailUndo").onclick = () => { dStrokes.pop(); nRedraw(); updateDButtons(); };
  document.getElementById("detailClear").onclick = () => { dStrokes = []; nRedraw(); updateDButtons(); };
  document.getElementById("detailCancel").onclick = () => { area.classList.remove("show"); };
  document.getElementById("detailAccept").onclick = async () => {
    if (dStrokes.length === 0) return;
    const btn = document.getElementById("detailAccept");
    btn.disabled = true;
    btn.textContent = "Saving…";
    const strokeData = dStrokes.map(s => s.map(p => [p.x, p.y, p.pressure]));
    const key = progressKey(char, tag);
    try {
      const saveBody = { char, sample_idx: existingCount, strokes: strokeData };
      if (tag) saveBody.tag = tag;
      const resp = await fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(saveBody),
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      progress[key] = (progress[key] || 0) + 1;
      existingCount++;
      updateDisplay();
      area.classList.remove("show");
      openCharDetail(char, null, tag);
    } catch (err) {
      alert(`Save failed: ${err.message}`);
      btn.disabled = false;
      btn.textContent = "Save";
    }
  };
}

function navigateDetail(delta) {
  if (managerCatIdx < 0) return;
  const cat = CATEGORIES[managerCatIdx];
  const newIdx = managerCharIdx + delta;
  if (newIdx < 0 || newIdx >= cat.chars.length) return;
  managerCharIdx = newIdx;
  openCharDetail(cat.chars[newIdx], cat.name, cat.tag);
}

function closeDetail() {
  document.getElementById("sampleDetail").classList.remove("show");
  renderManagerGrid();
}

// ========== INIT ==========

async function loadProgress() {
  try {
    const resp = await fetch("/api/progress");
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    progress = data.progress || {};
    setStatus(`${data.totalFiles} samples on server`, "saved");
  } catch (err) {
    setStatus(`Offline preview · ${err.message}`, "error");
    progress = {};
  }
}

async function init() {
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  canvas.addEventListener("pointerdown", startStroke);
  canvas.addEventListener("pointermove", continueStroke);
  canvas.addEventListener("pointerup", endStroke);
  canvas.addEventListener("pointercancel", endStroke);
  canvas.addEventListener("touchstart", e => e.preventDefault(), { passive: false });
  canvas.addEventListener("touchmove", e => e.preventDefault(), { passive: false });

  document.getElementById("btnUndo").addEventListener("click", () => { strokes.pop(); redraw(); updateButtons(); });
  document.getElementById("btnClear").addEventListener("click", clearCanvas);
  document.getElementById("btnSkip").addEventListener("click", skip);
  document.getElementById("btnAccept").addEventListener("click", accept);
  document.getElementById("titleBtn").addEventListener("click", showCategoryPicker);
  document.getElementById("btnDownload").addEventListener("click", downloadSamples);
  document.getElementById("btnReset").addEventListener("click", resetAll);
  document.getElementById("btnManage").addEventListener("click", openManager);
  document.getElementById("btnCloseOverlay").addEventListener("click", () => {
    document.getElementById("overlay").classList.remove("show");
  });
  document.getElementById("btnCloseManager").addEventListener("click", closeManager);
  document.getElementById("btnBackDetail").addEventListener("click", closeDetail);
  document.getElementById("btnPrevChar").addEventListener("click", () => navigateDetail(-1));
  document.getElementById("btnNextChar").addEventListener("click", () => navigateDetail(1));
  document.getElementById("samplesPerChar").addEventListener("change", (e) => {
    SAMPLES_PER_CHAR = parseInt(e.target.value, 10);
    updateDisplay();
  });

  await loadProgress();

  let started = false;
  for (let catIdx = 0; catIdx < CATEGORIES.length && !started; catIdx++) {
    const cat = CATEGORIES[catIdx];
    for (let i = 0; i < cat.chars.length; i++) {
      const key = progressKey(cat.chars[i], cat.tag);
      if ((progress[key] || 0) < SAMPLES_PER_CHAR) {
        currentCategory = catIdx;
        currentCharIdx = i;
        currentSampleIdx = progress[key] || 0;
        started = true;
        break;
      }
    }
  }
  if (!started) showCategoryPicker();

  updateDisplay();
  updateButtons();
}

init();
</script>
